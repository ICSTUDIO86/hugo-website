      .fretlab-faq-mini-box {
        padding: 12px 14px;
        border: 1px dashed rgba(18, 18, 18, 0.18);
        border-radius: 16px;
        background: rgba(250, 250, 249, 0.74);
      }

      .fretlab-faq-code-box {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 12px 12px 12px 14px;
        border: 1px dashed rgba(217, 119, 6, 0.34);
        border-radius: 16px;
        background: transparent;
        box-shadow: 0 10px 24px rgba(120, 53, 15, 0.06);
      }

      .fretlab-faq-code-box code {
        min-width: 0;

        color: #121212;

        font-size: 0.92rem;
        line-height: 1.55;
        white-space: nowrap;
      }

      .fretlab-faq-code-copy {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(18, 18, 18, 0.14);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        color: #92400e;
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .fretlab-faq-code-copy:hover,
      .fretlab-faq-code-copy.is-copied {
        transform: translateY(-1px);
        border-color: rgba(217, 119, 6, 0.42);
        background: rgba(255, 247, 237, 0.95);
      }

      .fretlab-faq-code-copy svg {
        width: 18px;
        height: 18px;

      }

        flex-wrap: wrap;
        gap: 10px;
      }

        border: 1px dashed rgba(18, 18, 18, 0.28);
        background: rgba(255, 247, 237, 0.9);
        color: #1f2937;
        text-decoration: none;

        background: rgba(254, 243, 199, 0.96);
      }

        function getFretlabPricingSource(buySection, lang) {
          var fallbacks = getFretlabPricingFallbacks(lang);
          var result = {
            freeTitle: fallbacks.freeTitle,
            freeFeatures: fallbacks.freeFeatures.slice(),
            fullTitle: fallbacks.fullTitle,
            fullFeatures: fallbacks.fullFeatures.slice()
          };

          var panels = buySection.querySelectorAll('div.rounded-xl.border.border-border\\/70.bg-card\\/40.p-3');
          Array.prototype.forEach.call(panels, function (panel) {
            var titleNode = panel.querySelector('p.font-sketch');
            var title = titleNode ? (titleNode.textContent || '').replace(/\s+/g, ' ').trim() : '';
            var items = Array.prototype.map.call(panel.querySelectorAll('li'), function (item) {
              return (item.textContent || '').replace(/\s+/g, ' ').trim();
            }).filter(Boolean);
            if (!title || !items.length) return;

            var normalizedTitle = title.toLowerCase();
            if (normalizedTitle.indexOf('trial') !== -1 || normalizedTitle.indexOf('free') !== -1 || title.indexOf('试用') !== -1 || title.indexOf('免费') !== -1) {
              result.freeTitle = title;
              result.freeFeatures = items;
              return;
            }

            if (normalizedTitle.indexOf('full') !== -1 || title.indexOf('完整') !== -1) {
              result.fullTitle = title;
              result.fullFeatures = items;
            }
          });

          return result;

              var copyButton = document.createElement('button');
              copyButton.type = 'button';
              copyButton.className = 'fretlab-faq-code-copy';
              copyButton.setAttribute('aria-label', lang === 'zh' ? '复制命令' : 'Copy command');
              copyButton.setAttribute('title', lang === 'zh' ? '复制命令' : 'Copy command');
              copyButton.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="2"></rect><path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path></svg>';
              copyButton.addEventListener('click', function () {
                copyFretlabFaqCommand(this, item.command, lang);
              });
              codeBox.appendChild(codeNode);
              codeBox.appendChild(copyButton);
              answer.appendChild(codeBox);
            }

            if (item.action) {
              var actions = document.createElement('div');
              actions.className = 'fretlab-faq-actions';
              var actionNode;

              if (item.action.kind === 'link') {
                actionNode = document.createElement('a');
                actionNode.href = item.action.href;
                actionNode.className = 'fretlab-faq-action font-hand text-base';
                actionNode.textContent = item.action.label;
              } else {
                actionNode = document.createElement('button');
                actionNode.type = 'button';
                actionNode.className = 'fretlab-faq-action font-hand text-base';
                actionNode.textContent = item.action.label;
                actionNode.addEventListener('click', function () {
                  var targetId = item.action.kind === 'recover' ? 'recover-access-code-btn' : 'refund-btn';
                  var target = document.getElementById(targetId);
                  if (target && typeof target.click === 'function') {
                    target.click();
                  } else {
                    var buySection = document.getElementById('buy');
                    if (buySection && typeof buySection.scrollIntoView === 'function') {
                      buySection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                  }
                });
              }

              actions.appendChild(actionNode);
              answer.appendChild(actions);
            }

            details.appendChild(summary);
            details.appendChild(answer);
            list.appendChild(details);
          });

          faqSection.appendChild(heading);
          faqSection.appendChild(list);
          syncFretlabFaqHeadingMarkWidth(faqSection, lang);
          faqSection.dataset.faqAccordionLang = lang;
        }

        function copyFretlabFaqCommand(button, text, lang) {
          function markCopied() {
            if (!button) return;
            var defaultLabel = lang === 'zh' ? '复制命令' : 'Copy command';
            var copiedLabel = lang === 'zh' ? '已复制' : 'Copied';
            button.classList.add('is-copied');
            button.setAttribute('aria-label', copiedLabel);
            button.setAttribute('title', copiedLabel);
            window.setTimeout(function () {
              button.classList.remove('is-copied');
              button.setAttribute('aria-label', defaultLabel);
              button.setAttribute('title', defaultLabel);
            }, 1400);
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(markCopied).catch(function () {});
          } else {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
              document.execCommand('copy');
              markCopied();
            } catch (_) {}
            document.body.removeChild(textarea);
          }
        }

        function ensureBuyPreviewRemoved() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var previewLink = buySection.querySelector('a[href="/fretlab-tool/"],a[href="/fretlab-tool"],a[href="/en/fretlab-tool/"],a[href="/en/fretlab-tool"]');
          if (!previewLink) return;

          var previewRow = previewLink.closest('div.flex.gap-3.flex-wrap.justify-center.mt-1');
          if (previewRow && previewRow.parentNode) {
            previewRow.parentNode.removeChild(previewRow);
          }
        }

        function ensureSupportActionCardsRemoved() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var supportGrid = null;
          var recoverButton = document.getElementById('recover-access-code-btn');
          var refundButton = document.getElementById('refund-btn');

          if (recoverButton && recoverButton.closest) {
            supportGrid = recoverButton.closest('div.grid.grid-cols-1.md\\:grid-cols-2.gap-4.w-full');
          }
          if (!supportGrid && refundButton && refundButton.closest) {
            supportGrid = refundButton.closest('div.grid.grid-cols-1.md\\:grid-cols-2.gap-4.w-full');
          }
          if (!supportGrid) return;

          supportGrid.style.display = 'none';
          supportGrid.setAttribute('aria-hidden', 'true');
          supportGrid.dataset.fretlabSupportCardsHidden = '1';
        }

        function setPreferredFretlabLanguage(lang) {
          try {
            if (lang === 'en') {
              localStorage.setItem('preferredLanguage', 'en');
              localStorage.setItem('ic_fretlab_ui_language', 'en');
            } else {
              localStorage.setItem('preferredLanguage', 'zh-CN');
              localStorage.setItem('ic_fretlab_ui_language', 'zh');
            }
          } catch (error) {
            // Ignore localStorage failures and still continue with navigation.
          }
        }

        function getFretlabLocalizedPageUrl(lang) {
          var search = window.location.search || '';
          var hash = window.location.hash || '';
          if (lang === 'en') {
            return '/en/fretlab/' + search + hash;
          }
          return '/fretlab/' + search + hash;
        }

        function bindFretlabLanguageRedirect() {
          if (document.documentElement.dataset.fretlabLangRedirectBound === '1') return;

          document.addEventListener('click', function (event) {
            var target = event.target && event.target.closest ? event.target.closest('[data-fretlab-lang-target], button') : null;
            if (!target) return;

            var header = target.closest('#root header');
            if (!header) return;

            var targetLang = target.getAttribute('data-fretlab-lang-target');
            if (!targetLang) {
              var label = (target.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
              if (label === 'en') {
                targetLang = 'en';
              } else if (label === '中文' || label === '简体中文' || label === 'zh') {
                targetLang = 'zh';
              }
            }
            if (!targetLang) return;

            var nextUrl = getFretlabLocalizedPageUrl(targetLang);
            var currentUrl = window.location.pathname + (window.location.search || '') + (window.location.hash || '');
            if (nextUrl === currentUrl) return;

            setPreferredFretlabLanguage(targetLang);
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === 'function') {
              event.stopImmediatePropagation();
            }
            window.location.assign(nextUrl);
          }, true);

          document.documentElement.dataset.fretlabLangRedirectBound = '1';
        }

        function ensureFretlabPageLanguageState() {
          var expectedLang = window.location.pathname.indexOf('/en/fretlab/') === 0 ? 'en' : 'zh';
          var root = document.getElementById('root');
          if (!root) return;

          var targetButton = root.querySelector('.fretlab-header-actions [data-fretlab-lang-target="' + expectedLang + '"]');
          if (!targetButton) return;

          var currentDocLang = (document.documentElement.lang || '').toLowerCase();
          var languageAligned = expectedLang === 'en'
            ? currentDocLang.indexOf('en') === 0
            : currentDocLang.indexOf('zh') === 0;
          var buttonActive = (targetButton.className || '').indexOf('bg-background') !== -1;
          if (languageAligned && buttonActive) {
            document.documentElement.dataset.fretlabUiLangSyncPending = '';
            return;
          }

          if (document.documentElement.dataset.fretlabUiLangSyncPending === expectedLang) return;
          document.documentElement.dataset.fretlabUiLangSyncPending = expectedLang;

          requestAnimationFrame(function () {
            var latestButton = document.querySelector('.fretlab-header-actions [data-fretlab-lang-target="' + expectedLang + '"]');
            if (!latestButton) {
              document.documentElement.dataset.fretlabUiLangSyncPending = '';
              return;
            }
            latestButton.click();
            setTimeout(function () {
              document.documentElement.dataset.fretlabUiLangSyncPending = '';
            }, 240);
          });
        }

        var runtimeEnhancersStarted = false;
        function startRuntimeEnhancers() {
          if (runtimeEnhancersStarted) return;
          runtimeEnhancersStarted = true;

          var tick = null;
          function scheduleEnsure() {
            if (tick) cancelAnimationFrame(tick);
            tick = requestAnimationFrame(function () {
              ensureHeaderNav();
              ensureFretlabPageLanguageState();
              ensureSectionOffsets();
              ensureMenuBarContent();
              ensureSmoothBuyScroll();
              ensureGumroadPayButton();
              ensureStandardFooter();
              ensurePricingCardsLayout();
              ensureUpdateLogBlock();
              ensureFaqAccordion();
              ensureSupportActionCardsRemoved();
            });
          }

          scheduleEnsure();
          setTimeout(scheduleEnsure, 200);
          setTimeout(scheduleEnsure, 800);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleEnsure();
          });
          observer.observe(root, {
            childList: true,
            subtree: true
          });

          var htmlObserver = new MutationObserver(function () {
            scheduleEnsure();
          });
          htmlObserver.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['lang']
          });
        }

        bindEarlyHeaderNavScrollCapture();
        bindFretlabLanguageRedirect();

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startRuntimeEnhancers, { once: true });
        } else {
          startRuntimeEnhancers();
        }
      })();
    </script>
  </body>
</html>

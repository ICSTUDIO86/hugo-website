    <script>
      (function () {
        var TITLE_SCALE = 0.92;
        var MIN_WIDTH = 20;
        var rafId = 0;

        function applyUnderlineWidths() {
          var root = document.getElementById('root');
          if (!root) return;
          var sections = root.querySelectorAll('section');
          sections.forEach(function (section) {
            var title = section.querySelector('h1, h2');
            var line = section.querySelector('svg.block');
            if (!title || !line) return;
            var titleWidth = title.getBoundingClientRect().width;
            if (!titleWidth || titleWidth <= 0) return;
            var targetWidth = Math.max(MIN_WIDTH, Math.floor(titleWidth * TITLE_SCALE));
            line.style.width = targetWidth + 'px';
            line.style.maxWidth = '100%';
          });
        }

        function scheduleApply() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(applyUnderlineWidths);
        }

        document.addEventListener('DOMContentLoaded', function () {
          scheduleApply();
          window.addEventListener('resize', scheduleApply);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleApply();
          });
          observer.observe(root, {
            childList: true,
            subtree: true,
            characterData: true
          });

          setTimeout(scheduleApply, 100);
          setTimeout(scheduleApply, 400);
        });
      })();
    </script>

        function ensureHeaderNav() {
          var root = document.getElementById('root');
          if (!root) return;

          var headerInner = root.querySelector('header > div');
          if (!headerInner) return;

          var brandGroup = headerInner.firstElementChild;
          var actionsGroup = headerInner.lastElementChild;
          if (!brandGroup || !actionsGroup || brandGroup === actionsGroup) return;

          headerInner.classList.add('fretlab-header-shell');
          brandGroup.classList.add('fretlab-header-brand');
          actionsGroup.classList.add('fretlab-header-actions');

          var nav = document.getElementById('fretlab-header-nav');
          if (!nav) {
            nav = document.createElement('nav');
            nav.id = 'fretlab-header-nav';
            nav.className = 'fretlab-header-nav';

          var navText = HEADER_NAV_LABELS[lang] || HEADER_NAV_LABELS.en;
          var renderKey = [lang, navText.features, navText.buy, navText.faq].join('|');
          if (nav.dataset.renderKey !== renderKey) {
            nav.innerHTML = ''
              + '<a href="#features" data-scroll-target="features">' + navText.features + '</a>'
              + '<a href="#buy" data-scroll-target="buy">' + navText.buy + '</a>'
              + '<a href="#faq" data-scroll-target="faq">' + navText.faq + '</a>';
            nav.dataset.renderKey = renderKey;

          Array.prototype.forEach.call(nav.querySelectorAll('a[data-scroll-target]'), function (link) {
            if (link.dataset.scrollBound === '1') return;
            link.addEventListener('click', function (event) {

            headerInner.insertBefore(nav, actionsGroup);

          document.documentElement.dataset.fretlabHeaderNavCaptureBound = '1';
        }

        function ensureUpdateLogBlock() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var accessInput = buySection.querySelector('#access-code-input');
          var payButton = buySection.querySelector('#fretlab-buy-alipay') || buySection.querySelector('#fretlab-buy-wechat');
          var anchor = null;
          if (accessInput && accessInput.closest) {
            anchor = accessInput.closest('div.relative.w-full');
          }
          if (!anchor && payButton && payButton.closest) {
            anchor = payButton.closest('div.relative.w-full');
          }
          if (!anchor) {
            anchor = buySection.querySelector('div.relative.w-full[style*="padding: 1.3rem"]')
              || buySection.querySelector('div.relative.w-full');
          }
          if (!anchor || !anchor.parentNode) return;

          var contentRoot = anchor.querySelector(':scope > div.relative.z-10')
            || anchor.querySelector('div.relative.z-10')
            || anchor;

          function findTrialFullBlock(scope) {
            if (!scope) return null;
            var grids = scope.querySelectorAll('div.grid.grid-cols-1.md\\:grid-cols-2.gap-3');
            for (var i = 0; i < grids.length; i++) {
              var text = (grids[i].textContent || '').replace(/\s+/g, ' ');
              var hasTrial = text.indexOf('试用版') !== -1 || text.indexOf('免费版') !== -1 || text.indexOf('Trial') !== -1 || text.indexOf('Free Version') !== -1;
              var hasFull = text.indexOf('完整版') !== -1 || text.indexOf('Full Version') !== -1;
              if (hasTrial && hasFull) return grids[i];
            }
            return null;
          }

          function findPreviewContainer(scope) {
            if (!scope) return null;
            var previewLink = scope.querySelector('a[href="/fretlab-tool/"],a[href="/fretlab-tool"],a[href="/en/fretlab-tool/"],a[href="/en/fretlab-tool"]');
            if (!previewLink) {
              var allLinks = scope.querySelectorAll('a[href]');
              for (var j = 0; j < allLinks.length; j++) {
                var linkText = (allLinks[j].textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
                if (linkText.indexOf('start now') !== -1 || linkText.indexOf('立即试用') !== -1) {
                  previewLink = allLinks[j];
                  break;
                }
              }
            }
            if (!previewLink) return null;
            var previewRow = previewLink.closest('div.flex.gap-3.flex-wrap.justify-center.mt-1');
            if (previewRow && scope.contains(previewRow)) return previewRow;
            var node = previewLink;
            while (node && node.parentNode && node.parentNode !== scope) {
              node = node.parentNode;
            }
            return node && node.parentNode === scope ? node : null;
          }

          var lang = getLang();
          var text = UPDATE_LOG_CONTENT[lang] || UPDATE_LOG_CONTENT.zh;
          var promo = PROMO_CAMPAIGN_CONTENT[lang] || PROMO_CAMPAIGN_CONTENT.zh;

          var promoBlock = document.getElementById('fretlab-promo-campaign-block');
          if (!promoBlock) {
            promoBlock = document.createElement('div');
            promoBlock.id = 'fretlab-promo-campaign-block';
            promoBlock.className = 'relative w-full fretlab-promo-campaign-wrap';
            promoBlock.innerHTML = ''
              + '<div class="fretlab-promo-campaign-card">'
              + '  <div class="fretlab-promo-campaign-copy">'
              + '    <p id="fretlab-promo-campaign-title" class="fretlab-promo-campaign-title font-hand text-base"></p>'
              + '  </div>'
              + '  <button id="fretlab-promo-campaign-open" type="button" class="fretlab-promo-campaign-trigger font-hand text-sm"></button>'
              + '</div>';
          }

          var block = document.getElementById('fretlab-update-log-block');
          if (!block) {
            block = document.createElement('div');
            block.id = 'fretlab-update-log-block';
            block.className = 'relative w-full fretlab-update-log-block-wrap';
            block.innerHTML = ''
              + '<div class="rounded-xl border border-border/70 bg-background/50 p-3">'
              + '  <div class="fretlab-update-log-content">'
              + '    <div class="fretlab-update-log-meta">'
              + '      <p id="fretlab-update-log-banner" class="font-hand text-base text-foreground" style="margin:0;"></p>'
              + '    </div>'
              + '    <button id="fretlab-update-log-open" type="button" class="fretlab-update-log-open-btn font-hand whitespace-nowrap rounded-lg border border-border bg-card px-4 py-2 text-base hover:bg-zinc-100"></button>'
              + '  </div>'
              + '</div>';

          }
          var trialFullBlock = findTrialFullBlock(contentRoot);
          var previewContainer = findPreviewContainer(contentRoot);
          var paymentButtonRow = payButton && payButton.parentNode ? payButton.parentNode : null;
          var accessSection = accessInput && accessInput.closest ? accessInput.closest('div.rounded-xl') : null;

          if (paymentButtonRow && accessSection && paymentButtonRow.parentNode === accessSection.parentNode) {
            if (promoBlock.parentNode !== paymentButtonRow.parentNode || promoBlock.nextElementSibling !== accessSection) {
              paymentButtonRow.insertAdjacentElement('afterend', promoBlock);
            }
          } else if (previewContainer && previewContainer.parentNode) {
            var promoParentNode = previewContainer.parentNode;
            if (promoBlock.parentNode !== promoParentNode || promoBlock.nextElementSibling !== previewContainer) {
              promoParentNode.insertBefore(promoBlock, previewContainer);
            }
          } else if (trialFullBlock && trialFullBlock.parentNode) {
            if (promoBlock.parentNode !== trialFullBlock.parentNode || promoBlock.previousElementSibling !== trialFullBlock) {
              trialFullBlock.insertAdjacentElement('afterend', promoBlock);
            }
          }

          // Preferred position:
          // directly above Start now.
          if (previewContainer && previewContainer.parentNode) {
            var parentNode = previewContainer.parentNode;
            if (block.parentNode !== parentNode || block.nextElementSibling !== previewContainer) {
              parentNode.insertBefore(block, previewContainer);
            }
          } else if (trialFullBlock && trialFullBlock.parentNode) {
            if (block.parentNode !== trialFullBlock.parentNode || block.previousElementSibling !== trialFullBlock) {
              trialFullBlock.insertAdjacentElement('afterend', block);
            }
          } else {
            return;
          }

          var promoTitleNode = document.getElementById('fretlab-promo-campaign-title');
          var promoOpenNode = document.getElementById('fretlab-promo-campaign-open');
          if (promoTitleNode) promoTitleNode.textContent = promo.title;
          if (promoOpenNode) promoOpenNode.textContent = promo.button;

          var promoModal = document.getElementById('fretlab-promo-campaign-modal');
          if (!promoModal) {
            promoModal = document.createElement('dialog');
            promoModal.id = 'fretlab-promo-campaign-modal';
            promoModal.className = 'fretlab-update-log-modal';
            promoModal.setAttribute('aria-hidden', 'true');
            document.body.appendChild(promoModal);
          }

          var promoModalRenderKey = getPromoCampaignRenderKey(lang, promo);
          if (promoModal.dataset.renderKey !== promoModalRenderKey) {
            promoModal.innerHTML = buildPromoCampaignModalHtml(promo);
            promoModal.dataset.renderKey = promoModalRenderKey;
          }

          var bannerNode = document.getElementById('fretlab-update-log-banner');
          var openNode = document.getElementById('fretlab-update-log-open');
          if (bannerNode) bannerNode.textContent = text.banner;
          if (openNode) {
            openNode.textContent = text.button;
          }

          var modal = document.getElementById('fretlab-update-log-modal');
          if (!modal) {
            modal = document.createElement('dialog');
            modal.id = 'fretlab-update-log-modal';
            modal.className = 'fretlab-update-log-modal';
            modal.setAttribute('aria-hidden', 'true');
            document.body.appendChild(modal);
          }

          var modalRenderKey = getModalRenderKey(lang, text);
          if (modal.dataset.renderKey !== modalRenderKey) {
            modal.innerHTML = buildModalHtml(text);
            modal.dataset.renderKey = modalRenderKey;
          }

          function finalizeModalClose() {
            modal.classList.remove('is-open');
            modal.removeAttribute('open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = modal.dataset.bodyOverflow || '';
            modal.dataset.bodyOverflow = '';
          }

          function closeModal() {
            if (typeof modal.close === 'function' && modal.open) {
              modal.close();
              return;
            }
            finalizeModalClose();
          }

          function openModal() {
            modal.dataset.bodyOverflow = document.body.style.overflow || '';
            document.body.style.overflow = 'hidden';
            modal.classList.add('is-open');
            modal.setAttribute('open', '');
            modal.setAttribute('aria-hidden', 'false');
            if (typeof modal.showModal === 'function' && !modal.open) {
              modal.showModal();
            }
          }

          function finalizePromoModalClose() {
            promoModal.classList.remove('is-open');
            promoModal.removeAttribute('open');
            promoModal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = promoModal.dataset.bodyOverflow || '';
            promoModal.dataset.bodyOverflow = '';
          }

          function closePromoModal() {
            if (typeof promoModal.close === 'function' && promoModal.open) {
              promoModal.close();
              return;
            }
            finalizePromoModalClose();
          }

          function openPromoModal() {
            promoModal.dataset.bodyOverflow = document.body.style.overflow || '';
            document.body.style.overflow = 'hidden';
            promoModal.classList.add('is-open');
            promoModal.setAttribute('open', '');
            promoModal.setAttribute('aria-hidden', 'false');
            if (typeof promoModal.showModal === 'function' && !promoModal.open) {
              promoModal.showModal();
            }
          }

          function isolateClickEvent(event) {
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === 'function') {
              event.stopImmediatePropagation();
            }
          }

          var modalActionBridge = window.__FRETLAB_UPDATE_LOG__ || {};
          modalActionBridge.open = function (event) {
            if (event) isolateClickEvent(event);
            openModal();
            return false;
          };
          modalActionBridge.close = function (event) {
            if (event) isolateClickEvent(event);
            closeModal();
            return false;
          };
          modalActionBridge.toggleHistory = function (node, event) {
            if (event) isolateClickEvent(event);
            var toggleNode = node && node.closest ? node.closest('.fretlab-history-toggle') : null;
            var entryNode = toggleNode && toggleNode.closest ? toggleNode.closest('.fretlab-history-entry') : null;
            var panelNode = entryNode ? entryNode.querySelector('.fretlab-history-detail') : null;
            var isOpen = !!(entryNode && entryNode.classList.contains('is-open'));
            if (!entryNode || !panelNode || !toggleNode) return false;
            entryNode.classList.toggle('is-open', !isOpen);
            toggleNode.setAttribute('aria-expanded', (!isOpen).toString());
            panelNode.hidden = isOpen;
            return false;
          };

          window.__FRETLAB_UPDATE_LOG__ = modalActionBridge;

          function bindPressAction(node, handler) {
            if (!node || node.dataset.updateLogBound === '1') return;
            var touchHandled = false;

            function run(event) {
              isolateClickEvent(event);
              handler(event);
            }

            node.addEventListener('touchend', function (event) {
              touchHandled = true;
              run(event);
            }, { passive: false });

            node.addEventListener('pointerup', function (event) {
              if (event.pointerType !== 'touch') return;
              touchHandled = true;
              run(event);
            });

            node.addEventListener('click', function (event) {
              if (touchHandled) {
                touchHandled = false;
                isolateClickEvent(event);
                return;
              }
              run(event);
            });

            node.dataset.updateLogBound = '1';
          }

          if (openNode) {
            bindPressAction(openNode, openModal);
          }

          if (promoOpenNode) {
            bindPressAction(promoOpenNode, openPromoModal);
          }

          var closeButton = document.getElementById('fretlab-update-log-close');
          if (closeButton) {
            bindPressAction(closeButton, closeModal);
          }

          var promoCloseButton = document.getElementById('fretlab-promo-campaign-close');
          if (promoCloseButton) {
            bindPressAction(promoCloseButton, closePromoModal);
          }

          var historyToggleNodes = modal.querySelectorAll('.fretlab-history-toggle');
          historyToggleNodes.forEach(function (historyToggleNode) {
            bindPressAction(historyToggleNode, function (event) {
              modalActionBridge.toggleHistory(historyToggleNode, event);
            });
          });

          if (modal.dataset.closeResetBound !== '1') {
            modal.addEventListener('close', function () {
              var activeEntries = modal.querySelectorAll('.fretlab-history-entry.is-open');
              activeEntries.forEach(function (entryNode) {
                entryNode.classList.remove('is-open');
              });
              var activeToggles = modal.querySelectorAll('.fretlab-history-toggle[aria-expanded=\"true\"]');
              activeToggles.forEach(function (toggleNode) {
                toggleNode.setAttribute('aria-expanded', 'false');
              });
              var activePanels = modal.querySelectorAll('.fretlab-history-detail');
              activePanels.forEach(function (panelNode) {
                panelNode.hidden = true;
              });
            });
            modal.dataset.closeResetBound = '1';
          }

          modal.onclose = function () {
            finalizeModalClose();
          };

          modal.onclick = function (event) {
            if (event.target === modal) closeModal();
          };

          promoModal.onclose = function () {
            finalizePromoModalClose();
          };

          promoModal.onclick = function (event) {
            if (event.target === promoModal) closePromoModal();
          };

          if (!ESCAPE_HANDLER_ATTACHED) {
            document.addEventListener('keydown', function (event) {
              var modalNode = document.getElementById('fretlab-update-log-modal');
              var promoModalNode = document.getElementById('fretlab-promo-campaign-modal');
              var promoIsOpen = !!(promoModalNode && (promoModalNode.open || promoModalNode.classList.contains('is-open')));
              var modalIsOpen = !!(modalNode && (modalNode.open || modalNode.classList.contains('is-open')));
              if (event.key === 'Escape' && promoIsOpen) {
                closePromoModal();
                return;
              }
              if (!modalIsOpen) return;
              if (event.key === 'Escape') {
                closeModal();
              }
            });
            ESCAPE_HANDLER_ATTACHED = true;
          }
        }

        function ensureBuyPreviewRemoved() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var previewLink = buySection.querySelector('a[href="/fretlab-tool/"],a[href="/fretlab-tool"],a[href="/en/fretlab-tool/"],a[href="/en/fretlab-tool"]');
          if (!previewLink) return;

          var previewRow = previewLink.closest('div.flex.gap-3.flex-wrap.justify-center.mt-1');
          if (previewRow && previewRow.parentNode) {
            previewRow.parentNode.removeChild(previewRow);
          }
        }

        function setPreferredFretlabLanguage(lang) {
          try {
            if (lang === 'en') {
              localStorage.setItem('preferredLanguage', 'en');
              localStorage.setItem('ic_fretlab_ui_language', 'en');
            } else {
              localStorage.setItem('preferredLanguage', 'zh-CN');
              localStorage.setItem('ic_fretlab_ui_language', 'zh');
            }
          } catch (error) {
            // Ignore localStorage failures and still continue with navigation.
          }
        }

        function getFretlabLocalizedPageUrl(lang) {
          var search = window.location.search || '';
          var hash = window.location.hash || '';
          if (lang === 'en') {
            return '/en/fretlab/' + search + hash;
          }
          return '/fretlab/' + search + hash;
        }

        function bindFretlabLanguageRedirect() {
          if (document.documentElement.dataset.fretlabLangRedirectBound === '1') return;

          document.addEventListener('click', function (event) {
            var target = event.target && event.target.closest ? event.target.closest('button') : null;
            if (!target) return;

            var header = target.closest('#root header');
            if (!header) return;

            var label = (target.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
            var targetLang = null;
            if (label === 'en') {
              targetLang = 'en';
            } else if (label === '中文' || label === '简体中文' || label === 'zh') {
              targetLang = 'zh';
            }
            if (!targetLang) return;

            var nextUrl = getFretlabLocalizedPageUrl(targetLang);
            var currentUrl = window.location.pathname + (window.location.search || '') + (window.location.hash || '');
            if (nextUrl === currentUrl) return;

            setPreferredFretlabLanguage(targetLang);
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === 'function') {
              event.stopImmediatePropagation();
            }
            window.location.assign(nextUrl);
          }, true);

          document.documentElement.dataset.fretlabLangRedirectBound = '1';
        }

        var runtimeEnhancersStarted = false;
        function startRuntimeEnhancers() {
          if (runtimeEnhancersStarted) return;
          runtimeEnhancersStarted = true;

          var tick = null;
          function scheduleEnsure() {
            if (tick) cancelAnimationFrame(tick);
            tick = requestAnimationFrame(function () {
              ensureHeaderNav();
              ensureSectionOffsets();
              ensureMenuBarContent();
              ensureSmoothBuyScroll();
              ensureGumroadPayButton();
              ensureStandardFooter();
              ensureBundleOfferBlock();
              ensureBuyModeToggle();
              ensureUpdateLogBlock();
              ensureBuyPreviewRemoved();
            });
          }

          scheduleEnsure();
          setTimeout(scheduleEnsure, 200);
          setTimeout(scheduleEnsure, 800);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleEnsure();
          });
          observer.observe(root, {
            childList: true,
            subtree: true
          });

          var htmlObserver = new MutationObserver(function () {
            scheduleEnsure();
          });
          htmlObserver.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['lang']
          });
        }

        bindEarlyHeaderNavScrollCapture();
        bindFretlabLanguageRedirect();

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startRuntimeEnhancers, { once: true });
        } else {
          startRuntimeEnhancers();
        }
      })();
    </script>
  </body>
</html>

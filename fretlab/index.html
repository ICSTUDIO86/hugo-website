<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/fretlab/fl-favicon.png" />
    <title>IC Fretboard Lab</title>
    <meta name="description" content="IC Fretboard Lab landing page" />
    <meta name="author" content="IC Studio" />

    <meta property="og:title" content="IC Fretboard Lab" />
    <meta property="og:description" content="Your fretboard. Your lab." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/fretlab/fretlab-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/fretlab/fretlab-logo.png" />
    <script type="module" crossorigin src="/fretlab/assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="/fretlab/assets/index.css">
  </head>

  <body>
    <div id="root"></div>
    <script defer src="/fretlab/js/fretlab-download-config.js?v=1.0.0"></script>
    <script defer src="/fretlab/js/fretlab-payment.js?v=1.1.15"></script>
    <script>
      (function () {
        var TITLE_SCALE = 0.92;
        var MIN_WIDTH = 20;
        var rafId = 0;

        function applyUnderlineWidths() {
          var root = document.getElementById('root');
          if (!root) return;
          var sections = root.querySelectorAll('section');
          sections.forEach(function (section) {
            var title = section.querySelector('h1, h2');
            var line = section.querySelector('svg.block');
            if (!title || !line) return;
            var titleWidth = title.getBoundingClientRect().width;
            if (!titleWidth || titleWidth <= 0) return;
            var targetWidth = Math.max(MIN_WIDTH, Math.floor(titleWidth * TITLE_SCALE));
            line.style.width = targetWidth + 'px';
            line.style.maxWidth = '100%';
          });
        }

        function scheduleApply() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(applyUnderlineWidths);
        }

        document.addEventListener('DOMContentLoaded', function () {
          scheduleApply();
          window.addEventListener('resize', scheduleApply);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleApply();
          });
          observer.observe(root, {
            childList: true,
            subtree: true,
            characterData: true
          });

          setTimeout(scheduleApply, 100);
          setTimeout(scheduleApply, 400);
        });
      })();
    </script>
  </body>
</html>

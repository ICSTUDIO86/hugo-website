    <script>
      (function () {
        var TITLE_SCALE = 0.92;
        var MIN_WIDTH = 20;
        var rafId = 0;

        function applyUnderlineWidths() {
          var root = document.getElementById('root');
          if (!root) return;
          var sections = root.querySelectorAll('section');
          sections.forEach(function (section) {
            var title = section.querySelector('h1, h2');
            var line = section.querySelector('svg.block');
            if (!title || !line) return;
            var titleWidth = title.getBoundingClientRect().width;
            if (!titleWidth || titleWidth <= 0) return;
            var targetWidth = Math.max(MIN_WIDTH, Math.floor(titleWidth * TITLE_SCALE));
            line.style.width = targetWidth + 'px';
            line.style.maxWidth = '100%';
          });
        }

        function scheduleApply() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(applyUnderlineWidths);
        }

        document.addEventListener('DOMContentLoaded', function () {
          scheduleApply();
          window.addEventListener('resize', scheduleApply);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleApply();
          });
          observer.observe(root, {
            childList: true,
            subtree: true,
            characterData: true
          });

          setTimeout(scheduleApply, 100);
          setTimeout(scheduleApply, 400);
        });
      })();
    </script>

        function getLang() {

        function buildModalHtml(text) {
          var currentItems = text.currentItems.map(function (item) {
            return '<li class="font-hand text-base text-muted-foreground" style="margin-top:6px;line-height:1.65;">' + item + '</li>';
          }).join('');

          var historyItems = (text.historyItems || []).map(function (item, index) {
            var detailItems = (item.detailItems || []).map(function (detailItem) {
              return '<li class="font-hand text-base text-muted-foreground" style="margin-top:6px;line-height:1.65;">' + detailItem + '</li>';
            }).join('');
            var detailTitle = item.detailTitle
              ? '<p class="font-hand text-base text-foreground" style="margin:10px 0 0;"><strong>' + item.detailTitle + '</strong></p>'
              : '';

            return '<li>'
              + '<div class="fretlab-history-entry" data-history-index="' + index + '">'

              + '</div>'

          }).join('');
          var historyContent = historyItems

            : '<p class="font-hand text-base text-muted-foreground" style="margin-top:8px;line-height:1.65;">' + (text.historyNote || '') + '</p>';

          return ''
            + '<div class="fretlab-update-log-panel">'
            + '  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">'
            + '    <h3 class="font-sketch text-3xl text-foreground">' + text.modalTitle + '</h3>'
            + '    <form method="dialog" class="fretlab-update-log-close-form">'
            + '      <button type="submit" id="fretlab-update-log-close" aria-label="' + text.close + '" class="font-hand rounded-lg border border-border bg-card px-3 py-1.5 text-sm hover:bg-zinc-100">&times;</button>'

            + '    <ul style="margin:8px 0 0 1.1rem;padding:0;">' + currentItems + '</ul>'

            + '  </div>'

        }

        function getModalRenderKey(lang, text) {
          var historyVersions = (text.historyItems || []).map(function (item) {
            return item.version || '';
          }).join('|');
          return [lang, text.currentVersion || '', historyVersions].join('::');
        }

        function getGumroadButtonText(lang) {
          return lang === 'en' ? 'Pay with Gumroad' : 'Gumroad 支付';
        }

        function ensureGumroadPayButton() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var alipayButton = buySection.querySelector('#fretlab-buy-alipay');
          var wechatButton = buySection.querySelector('#fretlab-buy-wechat');
          if (!alipayButton || !wechatButton) return;

          var buttonGrid = alipayButton.parentNode;
          if (!buttonGrid || buttonGrid !== wechatButton.parentNode) return;

          var lang = getLang();
          var button = document.getElementById('fretlab-buy-gumroad');
          if (!button) {
            button = document.createElement('a');
            button.id = 'fretlab-buy-gumroad';
            button.className = 'fretlab-gumroad-pay-btn font-hand rounded-xl border border-border bg-card px-4 py-3 text-lg hover:bg-zinc-100';
            button.href = 'https://icstudio3.gumroad.com/l/fretlab';
            button.target = '_blank';
            button.rel = 'noreferrer';
          }

          button.textContent = getGumroadButtonText(lang);

          if (button.parentNode !== buttonGrid.parentNode || button.previousElementSibling !== buttonGrid) {
            buttonGrid.insertAdjacentElement('afterend', button);
          }
        }

        function ensureSmoothBuyScroll() {
          if (document.documentElement.dataset.fretlabSmoothBuyBound === '1') return;

          document.addEventListener('click', function (event) {
            var link = event.target && event.target.closest
              ? event.target.closest('a[href="#buy"], a[href="/fretlab/#buy"], a[href="/en/fretlab/#buy"], a[href$="#buy"]')
              : null;
            if (!link) return;

            var buySection = document.getElementById('buy');
            if (!buySection) return;

            var href = link.getAttribute('href') || '';
            if (href.indexOf('#buy') === -1) return;

            event.preventDefault();
            buySection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, true);

          document.documentElement.dataset.fretlabSmoothBuyBound = '1';
        }

        function ensureUpdateLogBlock() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var accessInput = buySection.querySelector('#access-code-input');
          var payButton = buySection.querySelector('#fretlab-buy-alipay') || buySection.querySelector('#fretlab-buy-wechat');
          var anchor = null;
          if (accessInput && accessInput.closest) {
            anchor = accessInput.closest('div.relative.w-full');
          }
          if (!anchor && payButton && payButton.closest) {
            anchor = payButton.closest('div.relative.w-full');
          }
          if (!anchor) {
            anchor = buySection.querySelector('div.relative.w-full[style*="padding: 1.3rem"]')
              || buySection.querySelector('div.relative.w-full');
          }
          if (!anchor || !anchor.parentNode) return;

          var contentRoot = anchor.querySelector(':scope > div.relative.z-10')
            || anchor.querySelector('div.relative.z-10')
            || anchor;

          function findTrialFullBlock(scope) {
            if (!scope) return null;
            var grids = scope.querySelectorAll('div.grid.grid-cols-1.md\\:grid-cols-2.gap-3');
            for (var i = 0; i < grids.length; i++) {
              var text = (grids[i].textContent || '').replace(/\s+/g, ' ');
              var hasTrial = text.indexOf('试用版') !== -1 || text.indexOf('免费版') !== -1 || text.indexOf('Trial') !== -1 || text.indexOf('Free Version') !== -1;
              var hasFull = text.indexOf('完整版') !== -1 || text.indexOf('Full Version') !== -1;
              if (hasTrial && hasFull) return grids[i];
            }
            return null;
          }

          function findPreviewContainer(scope) {
            if (!scope) return null;
            var previewLink = scope.querySelector('a[href="/fretlab-tool/"],a[href="/fretlab-tool"],a[href="/en/fretlab-tool/"],a[href="/en/fretlab-tool"]');
            if (!previewLink) {
              var allLinks = scope.querySelectorAll('a[href]');
              for (var j = 0; j < allLinks.length; j++) {
                var linkText = (allLinks[j].textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
                if (linkText.indexOf('start now') !== -1 || linkText.indexOf('立即试用') !== -1) {
                  previewLink = allLinks[j];
                  break;
                }
              }
            }
            if (!previewLink) return null;
            var previewRow = previewLink.closest('div.flex.gap-3.flex-wrap.justify-center.mt-1');
            if (previewRow && scope.contains(previewRow)) return previewRow;
            var node = previewLink;
            while (node && node.parentNode && node.parentNode !== scope) {
              node = node.parentNode;
            }
            return node && node.parentNode === scope ? node : null;
          }

          var lang = getLang();
          var text = UPDATE_LOG_CONTENT[lang] || UPDATE_LOG_CONTENT.zh;

          var block = document.getElementById('fretlab-update-log-block');
          if (!block) {
            block = document.createElement('div');
            block.id = 'fretlab-update-log-block';
            block.className = 'relative w-full fretlab-update-log-block-wrap';
            block.innerHTML = ''
              + '<div class="rounded-xl border border-border/70 bg-background/50 p-3">'
              + '  <div class="fretlab-update-log-content">'
              + '    <div class="fretlab-update-log-meta">'
              + '      <p id="fretlab-update-log-banner" class="font-hand text-base text-foreground" style="margin:0;"></p>'
              + '    </div>'
              + '    <button id="fretlab-update-log-open" type="button" class="fretlab-update-log-open-btn font-hand whitespace-nowrap rounded-lg border border-border bg-card px-4 py-2 text-base hover:bg-zinc-100"></button>'
              + '  </div>'
              + '</div>';

          }
          var trialFullBlock = findTrialFullBlock(contentRoot);
          var previewContainer = findPreviewContainer(contentRoot);

          // Preferred position:
          // directly above Start now.
          if (previewContainer && previewContainer.parentNode) {
            var parentNode = previewContainer.parentNode;
            if (block.parentNode !== parentNode || block.nextElementSibling !== previewContainer) {
              parentNode.insertBefore(block, previewContainer);
            }
            if (trialFullBlock && trialFullBlock.parentNode === parentNode && trialFullBlock.nextElementSibling !== block) {
              trialFullBlock.insertAdjacentElement('afterend', block);
            }
          } else if (trialFullBlock && trialFullBlock.parentNode) {
            if (block.parentNode !== trialFullBlock.parentNode || block.previousElementSibling !== trialFullBlock) {
              trialFullBlock.insertAdjacentElement('afterend', block);
            }
          } else {
            return;
          }

          var bannerNode = document.getElementById('fretlab-update-log-banner');
          var openNode = document.getElementById('fretlab-update-log-open');
          if (bannerNode) bannerNode.textContent = text.banner;
          if (openNode) {
            openNode.textContent = text.button;
          }

          var modal = document.getElementById('fretlab-update-log-modal');
          if (!modal) {
            modal = document.createElement('dialog');
            modal.id = 'fretlab-update-log-modal';
            modal.className = 'fretlab-update-log-modal';
            modal.setAttribute('aria-hidden', 'true');
            document.body.appendChild(modal);
          }

          var modalRenderKey = getModalRenderKey(lang, text);
          if (modal.dataset.renderKey !== modalRenderKey) {
            modal.innerHTML = buildModalHtml(text);
            modal.dataset.renderKey = modalRenderKey;
          }

          function finalizeModalClose() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = modal.dataset.bodyOverflow || '';
            modal.dataset.bodyOverflow = '';
          }

          function closeModal() {
            if (typeof modal.close === 'function' && modal.open) {
              modal.close();
              return;
            }
            finalizeModalClose();
          }

          function openModal() {
            modal.dataset.bodyOverflow = document.body.style.overflow || '';
            document.body.style.overflow = 'hidden';
            modal.setAttribute('aria-hidden', 'false');
            if (typeof modal.showModal === 'function' && !modal.open) {
              modal.showModal();
            } else {
              modal.classList.add('is-open');
            }
          }

          function isolateClickEvent(event) {
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === 'function') {
              event.stopImmediatePropagation();
            }
          }

          var modalActionBridge = window.__FRETLAB_UPDATE_LOG__ || {};
          modalActionBridge.open = function (event) {
            if (event) isolateClickEvent(event);
            openModal();
            return false;
          };
          modalActionBridge.close = function (event) {
            if (event) isolateClickEvent(event);
            closeModal();
            return false;
          };
          modalActionBridge.toggleHistory = function (node, event) {
            if (event) isolateClickEvent(event);
            var toggleNode = node && node.closest ? node.closest('.fretlab-history-toggle') : null;
            var entryNode = toggleNode && toggleNode.closest ? toggleNode.closest('.fretlab-history-entry') : null;
            var panelNode = entryNode ? entryNode.querySelector('.fretlab-history-detail') : null;
            var isOpen = !!(entryNode && entryNode.classList.contains('is-open'));
            if (!entryNode || !panelNode || !toggleNode) return false;
            entryNode.classList.toggle('is-open', !isOpen);
            toggleNode.setAttribute('aria-expanded', (!isOpen).toString());
            panelNode.hidden = isOpen;
            return false;
          };

          window.__FRETLAB_UPDATE_LOG__ = modalActionBridge;

          function bindPressAction(node, handler) {
            if (!node || node.dataset.updateLogBound === '1') return;
            var touchHandled = false;

            function run(event) {
              isolateClickEvent(event);
              handler(event);
            }

            node.addEventListener('touchend', function (event) {
              touchHandled = true;
              run(event);
            }, { passive: false });

            node.addEventListener('pointerup', function (event) {
              if (event.pointerType !== 'touch') return;
              touchHandled = true;
              run(event);
            });

            node.addEventListener('click', function (event) {
              if (touchHandled) {
                touchHandled = false;
                isolateClickEvent(event);
                return;
              }
              run(event);
            });

            node.dataset.updateLogBound = '1';
          }

          if (openNode) {
            bindPressAction(openNode, openModal);
          }

          var closeButton = document.getElementById('fretlab-update-log-close');
          if (closeButton) {
            bindPressAction(closeButton, closeModal);
          }

          var historyToggleNodes = modal.querySelectorAll('.fretlab-history-toggle');
          historyToggleNodes.forEach(function (historyToggleNode) {
            bindPressAction(historyToggleNode, function (event) {
              modalActionBridge.toggleHistory(historyToggleNode, event);
            });
          });

          if (modal.dataset.closeResetBound !== '1') {
            modal.addEventListener('close', function () {
              var activeEntries = modal.querySelectorAll('.fretlab-history-entry.is-open');
              activeEntries.forEach(function (entryNode) {
                entryNode.classList.remove('is-open');
              });
              var activeToggles = modal.querySelectorAll('.fretlab-history-toggle[aria-expanded=\"true\"]');
              activeToggles.forEach(function (toggleNode) {
                toggleNode.setAttribute('aria-expanded', 'false');
              });
              var activePanels = modal.querySelectorAll('.fretlab-history-detail');
              activePanels.forEach(function (panelNode) {
                panelNode.hidden = true;
              });
            });
            modal.dataset.closeResetBound = '1';
          }

          modal.onclose = function () {
            finalizeModalClose();
          };

          modal.onclick = function (event) {
            if (event.target === modal) closeModal();
          };

          if (!ESCAPE_HANDLER_ATTACHED) {
            document.addEventListener('keydown', function (event) {
              var modalNode = document.getElementById('fretlab-update-log-modal');
              if (!modalNode || !modalNode.classList.contains('is-open')) return;
              if (event.key === 'Escape') {
                closeModal();
              }
            });
            ESCAPE_HANDLER_ATTACHED = true;
          }
        }

        document.addEventListener('DOMContentLoaded', function () {
          var tick = null;
          function scheduleEnsure() {
            if (tick) cancelAnimationFrame(tick);
            tick = requestAnimationFrame(function () {
              ensureSmoothBuyScroll();
              ensureGumroadPayButton();
              ensureUpdateLogBlock();
            });
          }

          scheduleEnsure();
          setTimeout(scheduleEnsure, 200);
          setTimeout(scheduleEnsure, 800);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleEnsure();
          });
          observer.observe(root, {
            childList: true,
            subtree: true
          });

          var htmlObserver = new MutationObserver(function () {
            scheduleEnsure();
          });
          htmlObserver.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['lang']
          });
        });
      })();
    </script>
  </body>
</html>

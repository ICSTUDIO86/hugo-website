    <style>
      .fretlab-update-log-block-wrap {
        padding: 0;

      }

      .fretlab-update-log-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;

      .fretlab-update-log-meta {
        display: flex;

      }

      .fretlab-update-log-open-btn {

      @media (max-width: 640px) {

          transform: none;
        }
      }

      .fretlab-update-log-modal {
        position: fixed;
        inset: 0;

      .fretlab-update-log-panel {
        width: min(760px, 100%);
        max-height: min(84vh, 780px);
        overflow: auto;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: #ffffff;
        box-shadow: 0 20px 44px rgba(15, 23, 42, 0.26);
        padding: 18px 18px 16px;
      }

  <body>
    <div id="root"></div>
    <script defer src="/fretlab/js/fretlab-download-config.js?v=1.0.0"></script>
    <script defer src="/fretlab/js/fretlab-payment.js?v=1.1.15"></script>
    <script>
      (function () {
        var TITLE_SCALE = 0.92;
        var MIN_WIDTH = 20;
        var rafId = 0;

        function applyUnderlineWidths() {
          var root = document.getElementById('root');
          if (!root) return;
          var sections = root.querySelectorAll('section');
          sections.forEach(function (section) {
            var title = section.querySelector('h1, h2');
            var line = section.querySelector('svg.block');
            if (!title || !line) return;
            var titleWidth = title.getBoundingClientRect().width;
            if (!titleWidth || titleWidth <= 0) return;
            var targetWidth = Math.max(MIN_WIDTH, Math.floor(titleWidth * TITLE_SCALE));
            line.style.width = targetWidth + 'px';
            line.style.maxWidth = '100%';
          });
        }

        function scheduleApply() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(applyUnderlineWidths);
        }

        document.addEventListener('DOMContentLoaded', function () {
          scheduleApply();
          window.addEventListener('resize', scheduleApply);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleApply();
          });
          observer.observe(root, {
            childList: true,
            subtree: true,
            characterData: true
          });

          setTimeout(scheduleApply, 100);
          setTimeout(scheduleApply, 400);
        });
      })();
    </script>
    <script>
      (function () {
        var UPDATE_LOG_CONTENT = {
          zh: {
            banner: '最后一次版本更新时间：2026年03月06日',
            button: '了解详情',
            modalTitle: '更新日志',
            close: '关闭',
            sectionCurrent: '当前版本',
            sectionHistory: '历史更新记录',
            historyNote: '这是首次更新记录，暂无更早历史记录。',
            currentVersion: 'v1.0.1（2026年03月06日）',
            currentItems: [
              '加入了新的指型',
              '加入了旋律小调和和声小调的指型',
              '加入了全音阶的指型',
              '新增导出动画功能：支持将 MuseScore 的 Tab 文件转换为实时动画。'
            ],
            historyItems: []
          },
          en: {
            banner: 'Last version update: March 6, 2026',
            button: 'View details',
            modalTitle: 'Update Log',
            close: 'Close',
            sectionCurrent: 'Current Version',
            sectionHistory: 'History',
            historyNote: 'This is the first update record. No earlier history is available.',
            currentVersion: 'v1.0.1 (March 6, 2026)',
            currentItems: [
              'Added new fretboard shape sets.',
              'Added melodic minor and harmonic minor shape sets.',
              'Added whole-tone scale shape sets.',
              'Added animation export: convert MuseScore TAB files into real-time animations.'
            ],
            historyItems: []
          }
        };
        var ESCAPE_HANDLER_ATTACHED = false;

        function getLang() {
          var lang = (document.documentElement.lang || '').toLowerCase();
          return lang.indexOf('en') === 0 ? 'en' : 'zh';
        }

        function buildModalHtml(text) {
          var currentItems = text.currentItems.map(function (item) {
            return '<li class="font-hand text-base text-muted-foreground" style="margin-top:6px;line-height:1.65;">' + item + '</li>';
          }).join('');

          var historyItems = (text.historyItems || []).map(function (item) {
            return '<li class="font-hand text-base text-muted-foreground" style="margin-top:8px;line-height:1.65;">'
              + '<strong class="text-foreground">' + item.version + '</strong>：' + item.summary
              + '<div style="margin-top:4px;">' + item.detail + '</div>'
              + '</li>';
          }).join('');
          var historyContent = historyItems
            ? '<ul style="margin:8px 0 0 1.1rem;padding:0;">' + historyItems + '</ul>'
            : '<p class="font-hand text-base text-muted-foreground" style="margin-top:8px;line-height:1.65;">' + (text.historyNote || '') + '</p>';

          return ''
            + '<div class="fretlab-update-log-panel">'
            + '  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">'
            + '    <h3 class="font-sketch text-3xl text-foreground">' + text.modalTitle + '</h3>'
            + '    <button type="button" id="fretlab-update-log-close" class="font-hand rounded-lg border border-border bg-card px-3 py-1.5 text-sm hover:bg-zinc-100">' + text.close + '</button>'
            + '  </div>'
            + '  <div style="margin-top:12px;">'
            + '    <h4 class="font-sketch text-2xl text-foreground">' + text.sectionCurrent + '</h4>'
            + '    <p class="font-hand text-base text-foreground" style="margin-top:8px;"><strong>' + text.currentVersion + '</strong></p>'
            + '    <ul style="margin:8px 0 0 1.1rem;padding:0;">' + currentItems + '</ul>'
            + '  </div>'
            + '  <div style="margin-top:14px;">'
            + '    <h4 class="font-sketch text-2xl text-foreground">' + text.sectionHistory + '</h4>'
            +      historyContent
            + '  </div>'
            + '</div>';
        }

        function ensureUpdateLogBlock() {
          var buySection = document.getElementById('buy');
          if (!buySection) return;

          var accessInput = buySection.querySelector('#access-code-input');
          var payButton = buySection.querySelector('#fretlab-buy-alipay') || buySection.querySelector('#fretlab-buy-wechat');
          var anchor = null;
          if (accessInput && accessInput.closest) {
            anchor = accessInput.closest('div.relative.w-full');
          }
          if (!anchor && payButton && payButton.closest) {
            anchor = payButton.closest('div.relative.w-full');
          }
          if (!anchor) {
            anchor = buySection.querySelector('div.relative.w-full[style*="padding: 1.3rem"]')
              || buySection.querySelector('div.relative.w-full');
          }
          if (!anchor || !anchor.parentNode) return;

          var contentRoot = anchor.querySelector(':scope > div.relative.z-10')
            || anchor.querySelector('div.relative.z-10')
            || anchor;

          function findTrialFullBlock(scope) {
            if (!scope) return null;
            var grids = scope.querySelectorAll('div.grid.grid-cols-1.md\\:grid-cols-2.gap-3');
            for (var i = 0; i < grids.length; i++) {
              var text = (grids[i].textContent || '').replace(/\s+/g, ' ');
              var hasTrial = text.indexOf('试用版') !== -1 || text.indexOf('免费版') !== -1 || text.indexOf('Trial') !== -1 || text.indexOf('Free Version') !== -1;
              var hasFull = text.indexOf('完整版') !== -1 || text.indexOf('Full Version') !== -1;
              if (hasTrial && hasFull) return grids[i];
            }
            return null;
          }

          function findPreviewContainer(scope) {
            if (!scope) return null;
            var previewLink = scope.querySelector('a[href="/fretlab-tool/"],a[href="/fretlab-tool"]');
            if (!previewLink) {
              var allLinks = scope.querySelectorAll('a[href]');
              for (var j = 0; j < allLinks.length; j++) {
                var linkText = (allLinks[j].textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
                if (linkText.indexOf('start now') !== -1 || linkText.indexOf('立即试用') !== -1) {
                  previewLink = allLinks[j];
                  break;
                }
              }
            }
            if (!previewLink) return null;
            var previewRow = previewLink.closest('div.flex.gap-3.flex-wrap.justify-center.mt-1');
            if (previewRow && scope.contains(previewRow)) return previewRow;
            var node = previewLink;
            while (node && node.parentNode && node.parentNode !== scope) {
              node = node.parentNode;
            }
            return node && node.parentNode === scope ? node : null;
          }

          var lang = getLang();
          var text = UPDATE_LOG_CONTENT[lang] || UPDATE_LOG_CONTENT.zh;

          var block = document.getElementById('fretlab-update-log-block');
          if (!block) {
            block = document.createElement('div');
            block.id = 'fretlab-update-log-block';
            block.className = 'relative w-full fretlab-update-log-block-wrap';
            block.innerHTML = ''
              + '<div class="rounded-xl border border-border/70 bg-background/50 p-3">'
              + '  <div class="fretlab-update-log-content">'
              + '    <div class="fretlab-update-log-meta">'
              + '      <p id="fretlab-update-log-banner" class="font-hand text-base text-foreground" style="margin:0;"></p>'
              + '    </div>'
              + '    <button id="fretlab-update-log-open" type="button" class="fretlab-update-log-open-btn font-hand whitespace-nowrap rounded-lg border border-border bg-card px-4 py-2 text-base hover:bg-zinc-100"></button>'
              + '  </div>'
              + '</div>';

          }

          var trialFullBlock = findTrialFullBlock(contentRoot);
          var previewContainer = findPreviewContainer(contentRoot);

          // Preferred position:
          // directly above Start now.
          if (previewContainer && previewContainer.parentNode) {
            var parentNode = previewContainer.parentNode;
            if (block.parentNode !== parentNode || block.nextElementSibling !== previewContainer) {
              parentNode.insertBefore(block, previewContainer);
            }
            if (trialFullBlock && trialFullBlock.parentNode === parentNode && trialFullBlock.nextElementSibling !== block) {
              trialFullBlock.insertAdjacentElement('afterend', block);
            }
          } else if (trialFullBlock && trialFullBlock.parentNode) {
            if (block.parentNode !== trialFullBlock.parentNode || block.previousElementSibling !== trialFullBlock) {
              trialFullBlock.insertAdjacentElement('afterend', block);
            }
          } else {
            return;
          }

          var bannerNode = document.getElementById('fretlab-update-log-banner');
          var openNode = document.getElementById('fretlab-update-log-open');
          if (bannerNode) bannerNode.textContent = text.banner;
          if (openNode) openNode.textContent = text.button;

          var modal = document.getElementById('fretlab-update-log-modal');
          if (!modal) {
            modal = document.createElement('div');
            modal.id = 'fretlab-update-log-modal';
            modal.className = 'fretlab-update-log-modal';
            modal.setAttribute('aria-hidden', 'true');
            document.body.appendChild(modal);
          }

          modal.innerHTML = buildModalHtml(text);

          function closeModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
          }

          function openModal() {
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
          }

          var closeButton = document.getElementById('fretlab-update-log-close');
          if (openNode) openNode.onclick = openModal;
          if (closeButton) closeButton.onclick = closeModal;

          modal.onclick = function (event) {
            if (event.target === modal) closeModal();
          };

          if (!ESCAPE_HANDLER_ATTACHED) {
            document.addEventListener('keydown', function (event) {
              var modalNode = document.getElementById('fretlab-update-log-modal');
              if (!modalNode || !modalNode.classList.contains('is-open')) return;
              if (event.key === 'Escape') {
                modalNode.classList.remove('is-open');
                modalNode.setAttribute('aria-hidden', 'true');
              }
            });
            ESCAPE_HANDLER_ATTACHED = true;
          }
        }

        document.addEventListener('DOMContentLoaded', function () {
          var tick = null;
          function scheduleEnsure() {
            if (tick) cancelAnimationFrame(tick);
            tick = requestAnimationFrame(ensureUpdateLogBlock);
          }

          scheduleEnsure();
          setTimeout(scheduleEnsure, 200);
          setTimeout(scheduleEnsure, 800);

          var root = document.getElementById('root');
          if (!root) return;

          var observer = new MutationObserver(function () {
            scheduleEnsure();
          });
          observer.observe(root, {
            childList: true,
            subtree: true
          });

          var htmlObserver = new MutationObserver(function () {
            scheduleEnsure();
          });
          htmlObserver.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['lang']
          });
        });
      })();
    </script>
